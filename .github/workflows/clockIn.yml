name: GongxueyunSign

on:
  schedule:
    # 北京时间 7:00 和 17:00 执行（UTC 时间 = 北京时间 - 8 小时）
    - cron: '0 23 * * *'   # 北京时间 7:00
    - cron: '0 9 * * *'    # 北京时间 17:00
  workflow_dispatch:       # 支持手动触发

jobs:
  clock-in:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行打卡
        env:
          USERS: ${{ secrets.USERS }}
        run: python clockIn.py
